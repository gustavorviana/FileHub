name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore FileHub.slnx

      - name: Build
        run: dotnet build FileHub.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FileHub.slnx --configuration Release --no-build --logger "trx" --results-directory TestResults
        env:
          # FTP integration tests rely on Docker; skip when not available.
          DOTNET_ENVIRONMENT: CI
          # AWS integration tests run only when these are present (the
          # [RequiresAws*] attributes inspect them and skip otherwise).
          # They live as repository-level secrets; PRs from forks won't
          # see them, which is intentional — secrets aren't exposed to
          # untrusted code.
          AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:           ${{ secrets.AWS_REGION }}
          FILEHUB_S3_BUCKET:    ${{ secrets.FILEHUB_S3_BUCKET }}
          FILEHUB_S3_BUCKET_B:  ${{ secrets.FILEHUB_S3_BUCKET_B }}
          AWS_REGION_B:         ${{ secrets.AWS_REGION_B }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
